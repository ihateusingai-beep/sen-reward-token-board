<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEN 獎勵表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }
        
        .token-board {
            background: white;
            border: 3px solid #333;
            border-radius: 12px;
            padding: 25px;
            max-width: 720px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .board-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .board-title {
            font-size: 26px;
            font-weight: bold;
            color: #333;
        }
        
        .board-subtitle {
            font-size: 26px;
            color: #666;
            margin-right: 10px;
            border-bottom: 1px dashed #999;
            padding: 0 6px;
            cursor: text;
        }
        
        .star-control {
            text-align: center;
            margin: 12px 0;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 8px;
        }
        
        .star-control button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 16px;
            margin: 0 4px;
            cursor: pointer;
        }
        
        .main-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin: 20px 0;
        }
        
        .goal-text {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }
        
        .reward-box {
            width: 130px;
            height: 130px;
            border: 3px dashed #4a90e2;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #f8f9fa;
        }
        
        .reward-box.has-reward {
            border-style: solid;
            border-color: #4caf50;
        }
        
        .reward-image {
            max-width: 140px;
            max-height: 140px;
            object-fit: contain;
        }
        
        .reward-text {
            font-size: 13px;
            color: #555;
            margin-top: 4px;
            text-align: center;
        }
        
        .tokens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
            gap: 10px;
            margin: 25px 0;
        }
        
        .token-slot {
            width: 52px;
            height: 52px;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .token-slot.filled {
            background: #fff9c4;
            border-color: #ffc107;
        }
        
        .progress {
            text-align: center;
            font-size: 16px;
            color: #555;
            margin: 10px 0;
        }
        
        .print-btn {
            background: #d4af37;
            color: #333;
            border: none;
            padding: 14px 36px;
            font-size: 19px;
            border-radius: 50px;
            cursor: pointer;
            display: block;
            margin: 20px auto 10px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        
        .reward-size-control {
            text-align: center;
            margin-top: 8px;
        }
        
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            pointer-events: none;
        }
        
        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,215,0,0.95);
            color: #333;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            display: none;
            z-index: 10000;
        }
        
        .celebration.show { display: block; }
        
        @media print {
            body { background: white; padding: 0; }
            .token-board { box-shadow: none; border: 3px solid #333; max-width: 100%; }
            .print-btn, .star-control, .reward-size-control, canvas { display: none !important; }
            @page { size: A4; margin: 10mm; }
        }
        
        @media (max-width: 600px) {
            .token-board { padding: 15px; }
            .tokens-grid { grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); }
            .token-slot { width: 46px; height: 46px; font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="token-board">
        <!-- 標題 -->
        <div class="board-header">
            <span class="board-subtitle" contenteditable="true">副標題</span>
            <span class="board-title">獎勵表</span>
        </div>
        
        <!-- 星星格數控制 -->
        <div class="star-control">
            <button onclick="changeStarCount(-1)">－</button>
            <span style="font-size:18px;font-weight:bold;margin:0 12px;">星星格數: <span id="starCountDisplay">12</span></span>
            <button onclick="changeStarCount(1)">＋</button>
        </div>
        
        <!-- 目標 + 獎勵 -->
        <div class="main-content">
            <div class="goal-text">我正在努力獲得</div>
            <div class="reward-box" id="rewardBox" onclick="openRewardModal()">
                <div class="reward-placeholder" id="rewardPlaceholder">點擊選擇獎勵</div>
                <img id="rewardImage" class="reward-image" style="display:none;">
                <div class="reward-text" id="rewardText" contenteditable="true"></div>
            </div>
        </div>
        
        <!-- 獎勵圖片大小控制 -->
        <div class="reward-size-control">
            <label style="font-size:14px;">圖片大小：</label>
            <input type="range" min="60" max="200" value="140" oninput="updateRewardSize(this.value)">
            <span id="sizeValue">140px</span>
        </div>
        
        <!-- 星星格 -->
        <div class="tokens-grid" id="tokensGrid"></div>
        
        <div class="progress" id="progressText">已獲得: 0 / 12 顆星</div>
        
        <!-- 打印按鈕 -->
        <button class="print-btn" onclick="preparePrint()">🖨️ 一鍵生成PDF / 打印實體獎勵表</button>
    </div>
    
    <!-- 慶祝訊息 -->
    <div class="celebration" id="celebrationMessage">🎉 太棒了！</div>
    
    <!-- Fireworks Canvas -->
    <canvas id="fireworksCanvas"></canvas>
    
    <script>
        // === 核心變數 ===
        let filledTokens = 0;
        let totalTokens = 12;
        let fireworksActive = false;
        let particles = [];
        
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        
        // === 星星格數調整 ===
        function changeStarCount(delta) {
            const newCount = totalTokens + delta;
            if (newCount < 3 || newCount > 20) return;
            
            totalTokens = newCount;
            document.getElementById('starCountDisplay').textContent = totalTokens;
            
            resetBoard();
            document.getElementById('tokensGrid').innerHTML = '';
            initTokens();
        }
        
        // === 初始化星星 ===
        function initTokens() {
            const grid = document.getElementById('tokensGrid');
            grid.innerHTML = '';
            
            for (let i = 0; i < totalTokens; i++) {
                const slot = document.createElement('div');
                slot.className = 'token-slot';
                slot.innerHTML = '<span class="star">⭐</span>';
                slot.onclick = () => toggleToken(slot);
                grid.appendChild(slot);
            }
        }
        
        function toggleToken(slot) {
            if (slot.classList.contains('filled')) {
                slot.classList.remove('filled');
                filledTokens--;
            } else {
                slot.classList.add('filled');
                filledTokens++;
                
                if (filledTokens === totalTokens) {
                    setTimeout(showCelebration, 300);
                }
            }
            updateProgress();
        }
        
        function updateProgress() {
            document.getElementById('progressText').textContent = 
                `已獲得: ${filledTokens} / ${totalTokens} 顆星`;
        }
        
        // === 煙花動畫 ===
        function createFirework(x, y) {
            for (let i = 0; i < 30; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    life: 60 + Math.random() * 30,
                    color: `hsl(${Math.random() * 60 + 40}, 100%, 70%)`
                });
            }
        }
        
        function animateFireworks() {
            if (!fireworksActive) return;
            
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vy += 0.08;
                
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 3, 3);
                
                if (p.life <= 0) particles.splice(i, 1);
            });
            
            if (fireworksActive) requestAnimationFrame(animateFireworks);
        }
        
        function startFireworks() {
            fireworksActive = true;
            particles = [];
            
            for (let i = 0; i < 6; i++) {
                setTimeout(() => {
                    createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.6);
                }, i * 180);
            }
            animateFireworks();
            
            setTimeout(() => { fireworksActive = false; }, 5200);
        }
        
        function showCelebration() {
            const msg = document.getElementById('celebrationMessage');
            msg.classList.add('show');
            startFireworks();
            
            setTimeout(() => {
                msg.classList.remove('show');
                
                // 永久完成提示
                const board = document.querySelector('.token-board');
                if (board && !document.getElementById('completeBadge')) {
                    const badge = document.createElement('div');
                    badge.id = 'completeBadge';
                    badge.style.cssText = 'text-align:center;margin-top:12px;font-size:20px;color:#2e7d32;font-weight:bold;';
                    badge.innerHTML = '✅ 已滿星完成！';
                    board.appendChild(badge);
                }
            }, 4800);
        }
        
        // === 獎勵相關 ===
        function openRewardModal() {
            // 簡單版本：直接彈出 prompt
            const name = prompt('輸入獎勵名稱（例如：小玩具）', '小玩具');
            if (!name) return;
            
            const emoji = prompt('輸入 emoji', '🎁');
            
            const placeholder = document.getElementById('rewardPlaceholder');
            const img = document.getElementById('rewardImage');
            const text = document.getElementById('rewardText');
            
            placeholder.style.display = 'none';
            img.style.display = 'block';
            img.src = `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle'%3E${emoji}%3C/text%3E%3C/svg%3E`;
            text.textContent = name;
            document.getElementById('rewardBox').classList.add('has-reward');
        }
        
        function updateRewardSize(size) {
            const img = document.getElementById('rewardImage');
            const val = document.getElementById('sizeValue');
            if (img) {
                img.style.width = size + 'px';
                img.style.height = size + 'px';
            }
            if (val) val.textContent = size + 'px';
        }
        
        // === 重置 ===
        function resetBoard() {
            document.querySelectorAll('.token-slot').forEach(s => s.classList.remove('filled'));
            filledTokens = 0;
            updateProgress();
            fireworksActive = false;
            particles = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const badge = document.getElementById('completeBadge');
            if (badge) badge.remove();
        }
        
        // === 打印準備 ===
        function preparePrint() {
            fireworksActive = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const msg = document.getElementById('celebrationMessage');
            if (msg) msg.classList.remove('show');
            window.print();
        }
        
        window.onbeforeprint = function() {
            fireworksActive = false;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        };
        
        // === 初始化 ===
        function init() {
            document.getElementById('starCountDisplay').textContent = totalTokens;
            initTokens();
            updateProgress();
            
            // 預設星星數顯示
            setTimeout(() => {
                const d = document.getElementById('starCountDisplay');
                if (d) d.textContent = totalTokens;
            }, 200);
        }
        
        init();
    </script>
</body>
</html>
