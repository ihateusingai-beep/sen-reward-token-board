<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEN 獎勵表</title>
    <style>
        /* ============================================================
         * SEN Token Reward Board — single-file vanilla JS
         * Refactor notes (v3.1.0):
         *   - Keyboard navigation: token slots tabIndex=0 + Enter/Space
         *   - prefers-reduced-motion: skip fireworks, show celebration only
         *   - Emoji picker modal replaces two stacked prompt() calls
         *     (a11y, works on iPad Safari where prompt() is suppressed)
         * v3.0.0:
         *   - All app state encapsulated in State() closure factory
         *   - All DOM refs cached at boot via DOM()
         *   - All CSS classes / magic strings promoted to CSS / STR
         *   - All tunables centralised in CONFIG
         *   - Particles use reverse filter (no splice-in-foreach)
         *   - Print uses iframe+srcdoc fallback chain + toast
         * ============================================================ */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .token-board {
            background: white;
            border: 3px solid #333;
            border-radius: 12px;
            padding: 25px;
            max-width: 720px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .board-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .board-title {
            font-size: 26px;
            font-weight: bold;
            color: #333;
        }

        .board-subtitle {
            font-size: 26px;
            color: #666;
            margin-right: 10px;
            border-bottom: 1px dashed #999;
            padding: 0 6px;
            cursor: text;
        }

        .star-control {
            text-align: center;
            margin: 12px 0;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 8px;
        }

        .star-control button {
            background: #4a90e2;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 16px;
            margin: 0 4px;
            cursor: pointer;
        }

        .main-content {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin: 20px 0;
        }

        .goal-text {
            font-size: 22px;
            font-weight: bold;
            color: #333;
        }

        .reward-box {
            width: 130px;
            height: 130px;
            border: 3px dashed #4a90e2;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #f8f9fa;
        }

        .reward-box.has-reward {
            border-style: solid;
            border-color: #4caf50;
        }

        .reward-image {
            max-width: 140px;
            max-height: 140px;
            object-fit: contain;
        }

        .reward-text {
            font-size: 13px;
            color: #555;
            margin-top: 4px;
            text-align: center;
        }

        .tokens-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
            gap: 10px;
            margin: 25px 0;
        }

        .token-slot {
            width: 52px;
            height: 52px;
            border: 2px solid #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafafa;
            position: relative;
            overflow: visible;
        }
        /* v3.2.1 — empty slot shows hollow ☆ (grey), filled shows solid ⭐ (gold) */
        .token-slot .star {
            color: #c8c8c8;
            opacity: 0.55;
            transition: color 0.2s, opacity 0.2s, transform 0.2s;
        }
        .token-slot:hover .star { opacity: 0.85; transform: scale(1.08); }
        .token-slot:focus-visible .star { opacity: 0.85; }
        .token-slot.filled {
            background: #fff9c4;
            border-color: #ffc107;
        }
        .token-slot.filled .star {
            color: #f5a623;
            opacity: 1;
            transform: scale(1);
            text-shadow: 0 1px 0 rgba(255,255,255,0.6);
        }
        /* v3.2.1 — per-click pulse feedback (one-shot, JS retriggers by toggling class) */
        @keyframes starFillPulse {
            0%   { transform: scale(1);   filter: drop-shadow(0 0 0   rgba(245,166,35,0)); }
            35%  { transform: scale(1.45); filter: drop-shadow(0 0 10px rgba(245,166,35,0.85)); }
            70%  { transform: scale(0.92); filter: drop-shadow(0 0 4px  rgba(245,166,35,0.45)); }
            100% { transform: scale(1);   filter: drop-shadow(0 0 0   rgba(245,166,35,0)); }
        }
        @keyframes starUnfillShrink {
            0%   { transform: scale(1);    opacity: 1; }
            40%  { transform: scale(0.55); opacity: 0.35; }
            100% { transform: scale(1);    opacity: 0.55; }
        }
        .token-slot.filling .star    { animation: starFillPulse   420ms cubic-bezier(.34,1.56,.64,1); }
        .token-slot.unfilling .star  { animation: starUnfillShrink 280ms ease-out; }
        @media (prefers-reduced-motion: reduce) {
            .token-slot.filling .star,
            .token-slot.unfilling .star { animation: none !important; }
            .fill-flash, .unfill-puff { display: none !important; }
        }
        /* v3.2.1 — overlay flash/puff elements */
        .fill-flash {
            position: absolute;
            inset: -6px;
            border-radius: 12px;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(255,215,90,0.85) 0%, rgba(255,215,90,0) 65%);
            animation: fillFlashAnim 480ms ease-out forwards;
        }
        @keyframes fillFlashAnim {
            0%   { opacity: 0; transform: scale(0.4); }
            30%  { opacity: 1; }
            100% { opacity: 0; transform: scale(1.6); }
        }
        .unfill-puff {
            position: absolute;
            inset: 0;
            border-radius: 8px;
            pointer-events: none;
            border: 2px solid #bbb;
            animation: unfillPuffAnim 320ms ease-out forwards;
        }
        @keyframes unfillPuffAnim {
            0%   { opacity: 0.8; transform: scale(1);    border-width: 3px; }
            100% { opacity: 0;   transform: scale(1.8);  border-width: 1px; }
        }

        .progress {
            text-align: center;
            font-size: 16px;
            color: #555;
            margin: 10px 0;
        }

        .print-btn {
            background: #d4af37;
            color: #333;
            border: none;
            padding: 14px 36px;
            font-size: 19px;
            border-radius: 50px;
            cursor: pointer;
            display: block;
            margin: 20px auto 10px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        .reward-size-control {
            text-align: center;
            margin-top: 8px;
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            pointer-events: none;
        }

        .celebration {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 215, 0, 0.95);
            color: #333;
            padding: 20px 40px;
            border-radius: 20px;
            font-size: 28px;
            font-weight: bold;
            display: none;
            z-index: 10000;
        }

        .celebration.show { display: block; }

    /* Print toast (new in v3.0.0 — restored from v2.0.1) */
    .print-toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: #1a1a1a;
        color: #fff;
        padding: 14px 22px;
        border-radius: 12px;
        font-size: 15px;
        z-index: 10001;
        display: none;
        box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        max-width: 90vw;
        text-align: center;
    }

    .print-toast.show { display: block; }
    .print-toast.error { background: #c62828; }
    .print-toast button {
        background: #fff;
        color: #1a1a1a;
        border: none;
        padding: 6px 12px;
        border-radius: 6px;
        margin-left: 12px;
        font-size: 14px;
        cursor: pointer;
    }

    /* Keyboard focus ring for token slots (a11y v3.1.0) */
    .token-slot:focus { outline: none; }
    .token-slot:focus-visible {
        outline: 3px solid #4a90e2;
        outline-offset: 2px;
        box-shadow: 0 0 0 2px #fff inset;
    }

    /* Emoji picker modal (replaces prompt() — a11y v3.1.0) */
    .emoji-picker-modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 10002;
    }
    .emoji-picker-modal.show { display: flex; }
    .emoji-picker-card {
        background: #fff;
        border-radius: 14px;
        padding: 22px;
        width: min(420px, 92vw);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }
    .emoji-picker-card h3 {
        margin: 0 0 12px;
        font-size: 18px;
        color: #333;
    }
    .emoji-picker-card input[type="text"] {
        width: 100%;
        font-size: 16px;
        padding: 8px 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        margin-bottom: 14px;
    }
    .emoji-picker-card input[type="text"]:focus-visible {
        outline: 3px solid #4a90e2;
        outline-offset: 1px;
        border-color: #4a90e2;
    }
    .emoji-grid {
        display: grid;
        grid-template-columns: repeat(8, 1fr);
        gap: 6px;
        margin-bottom: 16px;
    }
    .emoji-grid button {
        font-size: 26px;
        padding: 6px 0;
        border: 2px solid transparent;
        background: #f8f9fa;
        border-radius: 8px;
        cursor: pointer;
        line-height: 1;
    }
    .emoji-grid button:hover { background: #eef3fb; }
    .emoji-grid button:focus-visible {
        outline: 3px solid #4a90e2;
        outline-offset: 1px;
    }
    .emoji-grid button.selected {
        border-color: #4a90e2;
        background: #e3f0ff;
    }
    .emoji-picker-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
    }
    .emoji-picker-actions button {
        font-size: 15px;
        padding: 8px 16px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
    }
    .emoji-picker-actions .btn-primary {
        background: #4a90e2;
        color: #fff;
    }
    .emoji-picker-actions .btn-secondary {
        background: #eee;
        color: #333;
    }

    /* v3.2.0 — emoji category tabs (food / toy / activity / animal / other) */
    .emoji-category-tabs {
        display: flex;
        gap: 4px;
        margin-bottom: 10px;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
    }
    .emoji-category-tabs button {
        flex: 0 0 auto;
        font-size: 14px;
        padding: 6px 10px;
        border: 2px solid transparent;
        background: #f8f9fa;
        border-radius: 18px;
        cursor: pointer;
        white-space: nowrap;
        line-height: 1.2;
    }
    .emoji-category-tabs button:hover { background: #eef3fb; }
    .emoji-category-tabs button:focus-visible {
        outline: 3px solid #4a90e2;
        outline-offset: 1px;
    }
    .emoji-category-tabs button[aria-selected="true"] {
        background: #e3f0ff;
        border-color: #4a90e2;
        color: #1a4d80;
        font-weight: bold;
    }

    /* v3.2.0 — custom emoji paste row */
    .emoji-custom-row {
        margin-bottom: 14px;
    }
    .emoji-custom-row input {
        width: 100%;
        font-size: 16px;
        padding: 8px 10px;
        border: 2px dashed #ccc;
        border-radius: 8px;
        background: #fafbfc;
        text-align: center;
    }
    .emoji-custom-row input:focus-visible {
        outline: 3px solid #4a90e2;
        outline-offset: 1px;
        border-color: #4a90e2;
        background: #fff;
    }

    /* v3.2.0 — settings gear + popover panel */
    .settings-gear {
        position: fixed;
        top: 16px;
        right: 16px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid #ddd;
        border-radius: 50%;
        width: 42px;
        height: 42px;
        font-size: 20px;
        cursor: pointer;
        z-index: 10003;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }
    .settings-gear:hover { background: #fff; }
    .settings-gear:focus-visible {
        outline: 3px solid #4a90e2;
        outline-offset: 2px;
    }
    .settings-panel {
        position: fixed;
        top: 64px;
        right: 16px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 16px 18px;
        width: min(280px, 90vw);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        z-index: 10003;
    }
    .settings-panel h3 {
        margin: 0 0 12px;
        font-size: 16px;
        color: #333;
    }
    .settings-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        gap: 10px;
    }
    .settings-row label {
        font-size: 14px;
        color: #555;
    }
    .settings-row select {
        font-size: 14px;
        padding: 4px 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        background: #fff;
        cursor: pointer;
    }
    .settings-row select:focus-visible {
        outline: 2px solid #4a90e2;
        outline-offset: 1px;
    }
    .settings-hint {
        font-size: 12px;
        color: #888;
        margin-top: 4px;
    }
    @media print {
        .settings-gear, .settings-panel { display: none !important; }
    }

    @media print {
            body { background: white; padding: 0; }
            .token-board { box-shadow: none; border: 3px solid #333; max-width: 100%; }
            .print-btn, .star-control, .reward-size-control, canvas, .print-toast { display: none !important; }
            /* Print 已得嘅星做實色 ⭐,未得嘅保持 ☆ 但淡 */
            .token-slot .star { color: #555; opacity: 0.3; }
            .token-slot.filled .star { color: #f5a623; opacity: 1; }
            @page { size: A4; margin: 10mm; }
        }

        @media (max-width: 600px) {
            .token-board { padding: 15px; }
            .tokens-grid { grid-template-columns: repeat(auto-fill, minmax(46px, 1fr)); }
            .token-slot { width: 46px; height: 46px; font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="token-board">
        <!-- 標題 -->
        <div class="board-header">
            <span class="board-subtitle" contenteditable="true">副標題</span>
            <span class="board-title">獎勵表</span>
        </div>

        <!-- 星星格數控制 -->
        <div class="star-control">
            <button data-action="dec-stars">－</button>
            <span style="font-size:18px;font-weight:bold;margin:0 12px;">
                <span id="starCountDisplay" style="display:none;">12</span>
            </span>
            <button data-action="inc-stars">＋</button>
        </div>

        <!-- 目標 + 獎勵 -->
        <div class="main-content">
            <div class="goal-text">我正在努力獲得</div>
            <div class="reward-box" id="rewardBox" data-action="open-reward">
                <div class="reward-placeholder" id="rewardPlaceholder">點擊選擇獎勵</div>
                <img id="rewardImage" class="reward-image" style="display:none;">
                <div class="reward-text" id="rewardText" contenteditable="true"></div>
            </div>
        </div>

        <!-- 獎勵圖片大小控制 -->
        <div class="reward-size-control">
            <label style="font-size:14px;">圖片大小：</label>
            <input type="range" min="60" max="200" value="140" data-action="resize-reward">
            <span id="sizeValue">140px</span>
        </div>

        <!-- 星星格 -->
        <div class="tokens-grid" id="tokensGrid"></div>

        <div class="progress" id="progressText" aria-live="polite">已獲得: 0 / 12 顆星</div>

        <!-- 打印按鈕 -->
        <button class="print-btn" data-action="print">🖨️ 一鍵生成PDF / 打印實體獎勵表</button>
    </div>

    <!-- 慶祝訊息 -->
    <div class="celebration" id="celebrationMessage">🎉 太棒了！</div>

    <!-- 打印狀態 toast (new in v3.0.0) -->
    <div class="print-toast" id="printToast" role="status" aria-live="polite">
        <span id="printToastMsg">準備打印中…</span>
        <button id="printToastRetry" style="display:none;">再試一次</button>
        <button id="printToastDismiss" style="display:none;">我已用 Cmd/Ctrl+P</button>
    </div>

    <!-- Fireworks Canvas -->
    <canvas id="fireworksCanvas"></canvas>

    <!-- 隱藏 print iframe (new in v3.0.0) -->
    <iframe id="printFrame" style="position:absolute;width:0;height:0;border:0;visibility:hidden;" aria-hidden="true"></iframe>

    <!-- Emoji picker modal (v3.1.0 — replaces prompt(); v3.2.0 — +category tabs +recent) -->
    <div class="emoji-picker-modal" id="emojiPickerModal" role="dialog" aria-modal="true" aria-labelledby="emojiPickerTitle">
        <div class="emoji-picker-card">
            <h3 id="emojiPickerTitle">選擇獎勵</h3>
            <input type="text" id="emojiPickerName" placeholder="獎勵名稱（例如：小玩具）" maxlength="20" />
            <div class="emoji-category-tabs" id="emojiCategoryTabs" role="tablist"></div>
            <div class="emoji-grid" id="emojiGrid" role="tabpanel"></div>
            <div class="emoji-custom-row">
                <input type="text" id="emojiCustomInput" placeholder="或貼上任何 emoji（例：🦄）" maxlength="4" data-action="custom-emoji-input" />
            </div>
            <div class="emoji-picker-actions">
                <button type="button" class="btn-secondary" data-action="emoji-cancel">取消</button>
                <button type="button" class="btn-primary" data-action="emoji-ok">確定</button>
            </div>
        </div>
    </div>

    <!-- Settings panel (v3.2.0 — gear icon popover) -->
    <button type="button" class="settings-gear" id="settingsGear" data-action="toggle-settings" aria-label="設定" aria-expanded="false">⚙️</button>
    <div class="settings-panel" id="settingsPanel" role="dialog" aria-modal="false" aria-labelledby="settingsTitle" hidden>
        <h3 id="settingsTitle">設定</h3>
        <div class="settings-row">
            <label for="settingVfx">視覺特效</label>
            <select id="settingVfx" data-setting="vfxMode">
                <option value="combo">組合(煙花+紙屑+⭐)</option>
                <option value="spark">煙花</option>
                <option value="confetti">紙屑</option>
                <option value="star">⭐ 爆發</option>
                <option value="none">無</option>
            </select>
        </div>
        <div class="settings-row">
            <label for="settingMute">音效</label>
            <select id="settingMute" data-setting="muted">
                <option value="false">開啟</option>
                <option value="true">靜音</option>
            </select>
        </div>
        <div class="settings-row">
            <label for="settingPop">取消星聲</label>
            <select id="settingPop" data-setting="popSound">
                <option value="pop-classic">電子 click</option>
                <option value="pop-soft">柔和</option>
                <option value="pop-bubble">泡泡</option>
                <option value="pop-wood">木魚</option>
                <option value="pop-mute">無聲</option>
            </select>
        </div>
        <div class="settings-row">
            <label for="settingTap">獲得星聲</label>
            <select id="settingTap" data-setting="tapSound">
                <option value="tap-classic">明亮鈴</option>
                <option value="tap-soft">溫柔木</option>
                <option value="tap-chime">風鈴</option>
                <option value="tap-blip">太空</option>
                <option value="tap-mute">無聲</option>
            </select>
        </div>
        <div class="settings-hint">設定會自動儲存</div>
    </div>

    <script>
    (() => {
        'use strict';

        // ===== Tunables =====
        const CONFIG = Object.freeze({
            MIN_STARS: 3,
            MAX_STARS: 20,
            DEFAULT_STARS: 12,
            PARTICLES_PER_FIREWORK: 30,
            FIREWORK_COUNT: 6,
            FIREWORK_INTERVAL_MS: 180,
            FIREWORK_DURATION_MS: 5200,
            CELEBRATION_MSG_MS: 4800,
            CELEBRATION_DELAY_MS: 300,
            PARTICLE_LIFE_MIN: 60,
            PARTICLE_LIFE_VAR: 30,
            PARTICLE_VELOCITY_RANGE: 6,
            PARTICLE_GRAVITY: 0.08,
            PARTICLE_TRAIL: 'rgba(0, 0, 0, 0.2)',
            PRINT_PREPARE_MS: 2000,
            PRINT_RETRY_HOLD_MS: 5000,
            PARTICLE_SIZE: 3,
            // v3.1.0 a11y
            EMOJI_CHOICES: ['🎁','⭐','🍦','🎮','📚','🍫','🏆','🎨','🎵','🚲','🧸','🎯','🍔','🌟','🎪','🎈','🦄','🐻','🍰','🎲','⚽','🪁','🎭','🎺'],
            DEFAULT_EMOJI: '🎁',
            DEFAULT_REWARD_NAME: '小玩具',
            REDUCED_MOTION_QUERIES: ['(prefers-reduced-motion: reduce)'],
            // v3.2.0 — emoji categories + persistence
            EMOJI_CATEGORIES: [
                { id: 'recent',  label: '最近',   icon: '🕘' },
                { id: 'food',    label: '食物',   icon: '🍔',
                  emojis: ['🍦','🍫','🍔','🍰','🍕','🍎','🍩','🥤','🍓','🍪','🍇','🍉','🥕','🌽','🍿','🥨'] },
                { id: 'toy',     label: '玩具',   icon: '🧸',
                  emojis: ['🎮','🧸','🎲','🪁','🎨','🎭','🧩','🚂','🪀','🎪','🎯','🏀','🏐','🎱','🎳','🎰'] },
                { id: 'activity', label: '活動',  icon: '🚲',
                  emojis: ['🚲','📚','🎵','🏆','⚽','🏀','🎬','🎤','🎺','🎸','🎻','🎹','🎼','🎢','🎡','✈️'] },
                { id: 'animal',  label: '動物',   icon: '🐻',
                  emojis: ['🐻','🦄','🐶','🐱','🐰','🦊','🐼','🦋','🐢','🐠','🐯','🐸','🐵','🦁','🐮','🐷'] },
                { id: 'other',   label: '其他',   icon: '🌟',
                  emojis: ['🎁','⭐','🌟','🎈','🎉','🏅','💎','🪄','🎢','🎠','🎇','✨','💫','🌈','🎊','🎋'] },
            ],
            EMOJI_RECENT_MAX: 5,
            STORAGE_KEY: 'sen-reward-board:v3.2.0',
            DEFAULT_VFX_MODE: 'combo',
            DEFAULT_MUTED: false,
            DEFAULT_POP_SOUND: 'pop-classic',
            DEFAULT_TAP_SOUND: 'tap-classic',
        });

        // ===== String constants (was magic strings) =====
        const CLS = Object.freeze({
            FILLED: 'filled',
            SHOW: 'show',
            HAS_REWARD: 'has-reward',
            STAR_SLOT: 'token-slot',
            ERROR: 'error',
            COMPLETE_BADGE: 'completeBadge',
            SELECTED: 'selected',
        });

        // ===== DOM ref cache (was 13+ getElementById calls) =====
        const DOM = (() => {
            const $ = (id) => document.getElementById(id);
            return {
                tokensGrid:        $('tokensGrid'),
                progressText:      $('progressText'),
                celebrationMsg:    $('celebrationMessage'),
                starCountDisplay:  $('starCountDisplay'),
                rewardBox:         $('rewardBox'),
                rewardPlaceholder: $('rewardPlaceholder'),
                rewardImage:       $('rewardImage'),
                rewardText:        $('rewardText'),
                sizeValue:         $('sizeValue'),
                canvas:            $('fireworksCanvas'),
                printToast:        $('printToast'),
                printToastMsg:     $('printToastMsg'),
                printToastRetry:   $('printToastRetry'),
                printToastDismiss: $('printToastDismiss'),
                printFrame:        $('printFrame'),
                emojiPickerModal:  $('emojiPickerModal'),
                emojiPickerName:   $('emojiPickerName'),
                emojiGrid:         $('emojiGrid'),
                emojiCategoryTabs: $('emojiCategoryTabs'),
                customEmojiInput:  $('emojiCustomInput'),
                // v3.2.0 — settings panel
                settingsGear:      $('settingsGear'),
                settingsPanel:     $('settingsPanel'),
                settingVfx:        $('settingVfx'),
                settingMute:       $('settingMute'),
                settingPop:        $('settingPop'),     // v3.2.1 — pop sound preset
                settingTap:        $('settingTap'),     // v3.2.1 — tap sound preset
                body:              document.body,
                board:             document.querySelector('.token-board'),
                starControl:       document.querySelector('.star-control'),
            };
        })();

        // ===== State (was 4 top-level let) =====
        const State = {
            filledTokens: 0,
            totalTokens: CONFIG.DEFAULT_STARS,
            fireworksActive: false,
            particles: [],
            animFrameId: 0,
            fireworkTimers: [],
            pendingFullCheck: null,
            // v3.1.0 a11y
            reducedMotion: false,
            pendingEmoji: CONFIG.DEFAULT_EMOJI,
        };

        // ===== Utility: throttle raf =====
        const raf = (fn) => {
            State.animFrameId = requestAnimationFrame(fn);
        };

        // ===== DOM helpers =====
        function el(tag, props = {}, children = []) {
            const node = document.createElement(tag);
            Object.assign(node, props);
            children.forEach(c => node.appendChild(c));
            return node;
        }

        function text(node, txt) {
            if (node) node.textContent = txt;
        }

        // ===== Domain: tokens =====
        function changeStarCount(delta) {
            const next = State.totalTokens + delta;
            if (next < CONFIG.MIN_STARS || next > CONFIG.MAX_STARS) return;
            State.totalTokens = next;
            text(DOM.starCountDisplay, next);
            rebuildTokens();
        }

        function rebuildTokens() {
            State.filledTokens = 0;
            DOM.tokensGrid.innerHTML = '';
            for (let i = 0; i < State.totalTokens; i++) {
                const slot = el('div', { className: CLS.STAR_SLOT });
                slot.tabIndex = 0;
                slot.setAttribute('role', 'button');
                slot.setAttribute('aria-label', `星星格 ${i + 1}，未獲得`);
                // v3.2.1 — empty uses hollow ☆, fill swaps to solid ⭐
                slot.innerHTML = '<span class="star" aria-hidden="true">☆</span>';
                DOM.tokensGrid.appendChild(slot);
            }
            updateProgress();
        }

        function toggleToken(slot) {
            const star = slot.querySelector('.star');
            if (slot.classList.contains(CLS.FILLED)) {
                slot.classList.remove(CLS.FILLED);
                if (star) star.textContent = '☆';
                slot.setAttribute('aria-label', slot.getAttribute('aria-label').replace('已獲得','未獲得'));
                State.filledTokens--;
                if (!State.muted) SFX.tickOff();
                // v3.2.1 — retrigger CSS animation by remove→reflow→add
                slot.classList.remove('filling');
                slot.classList.add('unfilling');
                // tiny particle puff on unfill (CSS-only, no canvas)
                puffUnfill(slot);
            } else {
                slot.classList.add(CLS.FILLED);
                if (star) star.textContent = '⭐';
                slot.setAttribute('aria-label', slot.getAttribute('aria-label').replace('未獲得','已獲得'));
                State.filledTokens++;
                if (!State.muted) SFX.tickOn();
                // v3.2.1 — fill pulse + radial flash
                slot.classList.remove('unfilling');
                slot.classList.add('filling');
                flashFill(slot);
                if (State.filledTokens === State.totalTokens) {
                    // Guard against multi-fire from rapid clicks
                    if (State.pendingFullCheck) return;
                    State.pendingFullCheck = setTimeout(() => {
                        State.pendingFullCheck = null;
                        showCelebration();
                    }, CONFIG.CELEBRATION_DELAY_MS);
                }
            }
            updateProgress();
        }

        // v3.2.1 — radial gradient flash on fill (CSS-only, additive overlay)
        function flashFill(slot) {
            const f = document.createElement('span');
            f.className = 'fill-flash';
            slot.appendChild(f);
            f.addEventListener('animationend', () => f.remove(), { once: true });
        }
        // v3.2.1 — grey puff on unfill
        function puffUnfill(slot) {
            const p = document.createElement('span');
            p.className = 'unfill-puff';
            slot.appendChild(p);
            p.addEventListener('animationend', () => p.remove(), { once: true });
        }

        function updateProgress() {
            text(DOM.progressText, `已獲得: ${State.filledTokens} / ${State.totalTokens} 顆星`);
        }

        // ===== Fireworks =====
        function createFirework(x, y) {
            // v3.2.0 — particles now carry a `shape` discriminator so the
            // single animation loop can render multiple visual effects in parallel.
            for (let i = 0; i < CONFIG.PARTICLES_PER_FIREWORK; i++) {
                State.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * CONFIG.PARTICLE_VELOCITY_RANGE,
                    vy: (Math.random() - 0.5) * CONFIG.PARTICLE_VELOCITY_RANGE,
                    life: CONFIG.PARTICLE_LIFE_MIN + Math.random() * CONFIG.PARTICLE_LIFE_VAR,
                    color: `hsl(${Math.random() * 60 + 40}, 100%, 70%)`,
                    shape: 'spark',
                    rot: 0,
                    rv: 0,
                });
            }
        }

        // Confetti — rotating rectangles with horizontal gust drift
        function createConfetti(x, y) {
            const palette = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#1dd1a1', '#5f27cd'];
            for (let i = 0; i < CONFIG.PARTICLES_PER_FIREWORK; i++) {
                State.particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * CONFIG.PARTICLE_VELOCITY_RANGE * 0.8,
                    vy: (Math.random() - 0.7) * CONFIG.PARTICLE_VELOCITY_RANGE,
                    life: CONFIG.PARTICLE_LIFE_MIN * 1.5 + Math.random() * CONFIG.PARTICLE_LIFE_VAR,
                    color: palette[Math.floor(Math.random() * palette.length)],
                    shape: 'confetti',
                    rot: Math.random() * Math.PI * 2,
                    rv: (Math.random() - 0.5) * 0.25,
                });
            }
        }

        // Star burst — emoji particles (reward emoji if set, else ⭐)
        function createStarBurst(x, y) {
            const glyph = State.rewardEmoji || '⭐';
            for (let i = 0; i < CONFIG.PARTICLES_PER_FIREWORK; i++) {
                const angle = (i / CONFIG.PARTICLES_PER_FIREWORK) * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                State.particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: CONFIG.PARTICLE_LIFE_MIN * 1.2,
                    color: '#ffffff',
                    shape: 'star',
                    glyph,
                    rot: 0,
                    rv: (Math.random() - 0.5) * 0.1,
                });
            }
        }

        function animateFireworks(ctx) {
            // Reverse filter — safe splice equivalent, no skip-element bug
            const remaining = [];
            ctx.fillStyle = CONFIG.PARTICLE_TRAIL;
            ctx.fillRect(0, 0, DOM.canvas.width, DOM.canvas.height);
            for (const p of State.particles) {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                p.vy += CONFIG.PARTICLE_GRAVITY;
                p.rot += p.rv;
                if (p.life > 0) {
                    if (p.shape === 'confetti') {
                        // Rotating rectangle, larger than spark
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.fillStyle = p.color;
                        ctx.fillRect(-4, -3, 8, 6);
                        ctx.restore();
                    } else if (p.shape === 'star') {
                        // Emoji glyph with rotation
                        ctx.save();
                        ctx.translate(p.x, p.y);
                        ctx.rotate(p.rot);
                        ctx.font = '22px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(p.glyph, 0, 0);
                        ctx.restore();
                    } else {
                        // Default spark (unchanged from v3.1.0)
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x, p.y, CONFIG.PARTICLE_SIZE, CONFIG.PARTICLE_SIZE);
                    }
                    remaining.push(p);
                }
            }
            State.particles = remaining;
            if (State.fireworksActive) {
                raf(() => animateFireworks(ctx));
            }
        }

        function startFireworks() {
            State.fireworksActive = true;
            State.particles = [];
            const ctx = DOM.canvas.getContext('2d');
            const mode = State.vfxMode;

            // Dispatch which effects to fire, based on user-selected mode
            const effects = {
                'spark':    ['spark'],
                'confetti': ['confetti'],
                'star':     ['star'],
                'combo':    ['spark', 'confetti', 'star'],  // 預設 = 全包
                'none':     [],
            }[mode] || ['spark'];

            for (let i = 0; i < CONFIG.FIREWORK_COUNT; i++) {
                const t = setTimeout(() => {
                    if (effects.length === 0) return;
                    const x = Math.random() * DOM.canvas.width;
                    const y = Math.random() * DOM.canvas.height * 0.6;
                    effects.forEach(eff => {
                        if (eff === 'spark')    createFirework(x, y);
                        if (eff === 'confetti') createConfetti(x, y);
                        if (eff === 'star')     createStarBurst(x, y);
                    });
                }, i * CONFIG.FIREWORK_INTERVAL_MS);
                State.fireworkTimers.push(t);
            }
            raf(() => animateFireworks(ctx));

            const endTimer = setTimeout(() => {
                stopFireworks();
            }, CONFIG.FIREWORK_DURATION_MS);
            State.fireworkTimers.push(endTimer);
        }

        function stopFireworks() {
            State.fireworksActive = false;
            State.fireworkTimers.forEach(clearTimeout);
            State.fireworkTimers = [];
            if (State.animFrameId) {
                cancelAnimationFrame(State.animFrameId);
                State.animFrameId = 0;
            }
            const ctx = DOM.canvas.getContext('2d');
            ctx.clearRect(0, 0, DOM.canvas.width, DOM.canvas.height);
            State.particles = [];
        }

        function showCelebration() {
            DOM.celebrationMsg.classList.add(CLS.SHOW);
            if (!State.muted) SFX.celebrate();
            if (!State.reducedMotion) {
                startFireworks();
            }

            setTimeout(() => {
                DOM.celebrationMsg.classList.remove(CLS.SHOW);
                // Persistent completion badge (per user requirement: stay visible but not require reset)
                if (!document.getElementById(CLS.COMPLETE_BADGE)) {
                    const badge = el('div', { id: CLS.COMPLETE_BADGE });
                    badge.style.cssText = 'text-align:center;margin-top:12px;font-size:20px;color:#2e7d32;font-weight:bold;';
                    badge.textContent = '✅ 已滿星完成！';
                    DOM.board.appendChild(badge);
                }
            }, CONFIG.CELEBRATION_MSG_MS);
        }

        // ===== SFX (Web Audio synth, no external files) =====
        // Why Web Audio: keeps index.html self-contained (no .mp3/.wav assets).
        // All sounds are short oscillator envelopes — <1ms CPU per cue, paused when muted.
        const SFX = (() => {
            let ctx = null;
            const ensure = () => {
                if (ctx) return ctx;
                try {
                    const AC = window.AudioContext || window.webkitAudioContext;
                    ctx = AC ? new AC() : null;
                } catch (_) { ctx = null; }
                return ctx;
            };
            // Resume on first user gesture (mobile autoplay policy)
            const resume = () => {
                if (ctx && ctx.state === 'suspended') ctx.resume();
            };

            // Generic tone: type, freq, dur, gain, attack, release
            const tone = (type, freq, dur, gain = 0.15, attack = 0.005, release = 0.04) => {
                const ac = ensure();
                if (!ac) return;
                resume();
                const osc = ac.createOscillator();
                const env = ac.createGain();
                osc.type = type;
                osc.frequency.value = freq;
                env.gain.setValueAtTime(0, ac.currentTime);
                env.gain.linearRampToValueAtTime(gain, ac.currentTime + attack);
                env.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur + release);
                osc.connect(env).connect(ac.destination);
                osc.start();
                osc.stop(ac.currentTime + dur + release);
            };

            // Pitch sweep: start → end freq over dur
            const sweep = (type, fStart, fEnd, dur, gain = 0.12) => {
                const ac = ensure();
                if (!ac) return;
                resume();
                const osc = ac.createOscillator();
                const env = ac.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(fStart, ac.currentTime);
                osc.frequency.exponentialRampToValueAtTime(fEnd, ac.currentTime + dur);
                env.gain.setValueAtTime(0, ac.currentTime);
                env.gain.linearRampToValueAtTime(gain, ac.currentTime + 0.005);
                env.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
                osc.connect(env).connect(ac.destination);
                osc.start();
                osc.stop(ac.currentTime + dur);
            };

            // Note: a tone + a sweep is fine on their own; arpeggio = sequence of tones.
            // v3.2.1 — pop sound preset registry. tickOff() reads State.popSound.
            const POP_PRESETS = Object.freeze({
                'pop-classic': () => tone('square', 220, 0.04, 0.08),                 // 傳統電子 click
                'pop-soft':    () => tone('triangle', 440, 0.05, 0.06),               // 柔和「嘟」
                'pop-bubble':  () => {                                                 // 泡泡破
                    sweep('sine', 600, 300, 0.08, 0.10);
                    // noise tail via BufferSource (white noise burst, 30ms)
                    const ac = ensure(); if (!ac) return;
                    const buf = ac.createBuffer(1, ac.sampleRate * 0.03, ac.sampleRate);
                    const data = buf.getChannelData(0);
                    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
                    const src = ac.createBufferSource();
                    const env = ac.createGain();
                    src.buffer = buf;
                    env.gain.setValueAtTime(0.04, ac.currentTime);
                    env.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.03);
                    src.connect(env).connect(ac.destination);
                    src.start();
                    src.stop(ac.currentTime + 0.03);
                },
                'pop-wood':    () => tone('square', 180, 0.005, 0.12),                // 木魚「咔」
                'pop-mute':    () => { /* silent */ },                                // 暫停(pop 嗰下)
            });
            const DEFAULT_POP = 'pop-classic';

            // v3.2.1 — tap sound preset registry. tickOn() reads State.tapSound.
            const TAP_PRESETS = Object.freeze({
                'tap-classic': () => {                                                // 明亮鈴:880 + 1320 harmonic
                    tone('triangle', 880, 0.06, 0.10);
                    tone('triangle', 1320, 0.04, 0.05);
                },
                'tap-soft':    () => tone('triangle', 660, 0.08, 0.08),               // 溫柔木
                'tap-chime':   () => {                                                // 風鈴 do-mi-sol 120ms 內
                    [1200, 1500, 1800].forEach((f, i) =>
                        setTimeout(() => tone('sine', f, 0.10, 0.08), i * 40));
                },
                'tap-blip':    () => sweep('sine', 1320, 880, 0.06, 0.10),             // 太空(Mario coin)
                'tap-mute':    () => { /* silent */ },                                // 暫停(tap 嗰下)
            });
            const DEFAULT_TAP = 'tap-classic';

            return {
                isAvailable: () => !!ensure(),
                resume,
                POP_PRESETS,
                DEFAULT_POP,
                TAP_PRESETS,
                DEFAULT_TAP,
                // 5 SFX touchpoints (per user choice)
                tickOn:    () => {                                          // v3.2.1 — tap preset
                    const preset = (State && State.tapSound) || DEFAULT_TAP;
                    const fn = TAP_PRESETS[preset] || TAP_PRESETS[DEFAULT_TAP];
                    fn();
                },
                tickOff:   () => {                                          // v3.2.1 — pop preset
                    const preset = (State && State.popSound) || DEFAULT_POP;
                    const fn = POP_PRESETS[preset] || POP_PRESETS[DEFAULT_POP];
                    fn();
                },
                celebrate: () => {                                          // 滿星 arpeggio do-mi-sol-do
                    const seq = [660, 784, 880, 1046];
                    seq.forEach((f, i) => setTimeout(() => tone('triangle', f, 0.12, 0.18), i * 110));
                },
                rewardOpen: () => sweep('sine', 800, 600, 0.08, 0.1),       // reward box click
                sliderTick: () => tone('sine', 1200, 0.015, 0.05),          // size slider drag
                whoosh:     () => sweep('sawtooth', 200, 1200, 0.25, 0.08), // print launch
            };
        })();

        // ===== Settings (localStorage-backed, per-user) =====
        // v3.2.0 — persists VFX mode, mute state, and recent emoji history.
        // Reads on init(), writes on change. Safe to call before init() returns defaults.
        const Settings = (() => {
            const cache = {};
            try {
                const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
                if (raw) Object.assign(cache, JSON.parse(raw));
            } catch (_) { /* corrupt JSON — ignore, use defaults */ }

            const persist = () => {
                try {
                    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(cache));
                } catch (_) { /* quota / private mode — silent */ }
            };
            return {
                get(key) { return cache[key]; },
                set(key, value) { cache[key] = value; persist(); },
            };
        })();

        // v3.2.0 — read persisted settings into State
        State.vfxMode = Settings.get('vfxMode') || CONFIG.DEFAULT_VFX_MODE;
        State.muted   = Settings.get('muted')   ?? CONFIG.DEFAULT_MUTED;
        State.rewardEmoji = Settings.get('rewardEmoji') || CONFIG.DEFAULT_EMOJI;
        // v3.2.1 — pop sound preset
        State.popSound = Settings.get('popSound') || CONFIG.DEFAULT_POP_SOUND;
        // v3.2.1 — tap sound preset
        State.tapSound = Settings.get('tapSound') || CONFIG.DEFAULT_TAP_SOUND;

        function toggleSettingsPanel() {
            const open = DOM.settingsPanel.hasAttribute('hidden');
            if (open) {
                DOM.settingsPanel.removeAttribute('hidden');
                DOM.settingsGear.setAttribute('aria-expanded', 'true');
                // Sync selects with current State
                DOM.settingVfx.value = State.vfxMode;
                DOM.settingMute.value = State.muted ? 'true' : 'false';
                if (DOM.settingPop) DOM.settingPop.value = State.popSound;
                if (DOM.settingTap) DOM.settingTap.value = State.tapSound;
            } else {
                DOM.settingsPanel.setAttribute('hidden', '');
                DOM.settingsGear.setAttribute('aria-expanded', 'false');
            }
        }

        // ===== Reward =====
        // v3.2.0 — emoji picker: category tabs + custom paste + recent history.
        // State.activeCategory drives which set of emoji is rendered in the grid.
        const State2 = {
            activeCategory: 'recent',
        };

        function openRewardModal() {
            if (!State.muted) SFX.rewardOpen();
            DOM.emojiPickerName.value = DOM.rewardText.textContent || CONFIG.DEFAULT_REWARD_NAME;
            // v3.2.0 — initialise pendingEmoji from current reward if set, else default
            State.pendingEmoji = State.rewardEmoji || CONFIG.DEFAULT_EMOJI;
            // v3.2.0 — try to land on a category that contains the pending emoji
            State2.activeCategory = findCategoryOfEmoji(State.pendingEmoji) || 'recent';
            renderEmojiCategoryTabs();
            renderEmojiGrid();
            DOM.customEmojiInput.value = '';
            DOM.emojiPickerModal.classList.add(CLS.SHOW);
            // Defer focus so the modal is in the DOM and visible
            setTimeout(() => DOM.emojiPickerName.focus(), 0);
        }

        function findCategoryOfEmoji(emoji) {
            for (const cat of CONFIG.EMOJI_CATEGORIES) {
                if (cat.emojis && cat.emojis.includes(emoji)) return cat.id;
            }
            return null;
        }

        function getCurrentCategoryEmojis() {
            const cat = CONFIG.EMOJI_CATEGORIES.find(c => c.id === State2.activeCategory);
            if (!cat) return [];
            if (cat.id === 'recent') return Settings.get('recentEmojis') || [];
            return cat.emojis || [];
        }

        function renderEmojiCategoryTabs() {
            DOM.emojiCategoryTabs.innerHTML = '';
            const recent = Settings.get('recentEmojis') || [];
            CONFIG.EMOJI_CATEGORIES.forEach(cat => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.category = cat.id;
                btn.setAttribute('role', 'tab');
                btn.setAttribute('aria-selected', cat.id === State2.activeCategory ? 'true' : 'false');
                btn.setAttribute('aria-controls', 'emojiGrid');
                if (cat.id === 'recent') {
                    btn.textContent = `${cat.icon} ${cat.label}${recent.length ? ` (${recent.length})` : ''}`;
                    if (recent.length === 0) btn.disabled = true;
                } else {
                    btn.textContent = `${cat.icon} ${cat.label}`;
                }
                btn.addEventListener('click', () => {
                    State2.activeCategory = cat.id;
                    renderEmojiCategoryTabs();
                    renderEmojiGrid();
                });
                DOM.emojiCategoryTabs.appendChild(btn);
            });
        }

        function renderEmojiGrid() {
            DOM.emojiGrid.innerHTML = '';
            const emojis = getCurrentCategoryEmojis();
            if (emojis.length === 0) {
                const empty = document.createElement('div');
                empty.style.cssText = 'grid-column:1/-1;text-align:center;color:#888;padding:14px;font-size:13px;';
                empty.textContent = '未有最近用過嘅 emoji';
                DOM.emojiGrid.appendChild(empty);
                return;
            }
            emojis.forEach((emoji, idx) => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.emoji = emoji;
                btn.setAttribute('aria-label', `選擇 ${emoji}`);
                btn.textContent = emoji;
                if (emoji === State.pendingEmoji) {
                    btn.classList.add(CLS.SELECTED);
                }
                btn.addEventListener('click', () => {
                    State.pendingEmoji = emoji;
                    DOM.emojiGrid.querySelectorAll('button').forEach(b =>
                        b.classList.toggle(CLS.SELECTED, b.dataset.emoji === emoji)
                    );
                    // Reflect custom input back to empty
                    if (DOM.customEmojiInput) DOM.customEmojiInput.value = '';
                });
                DOM.emojiGrid.appendChild(btn);
                if (idx === 0) btn.tabIndex = 0;
            });
        }

        function closeRewardModal(commit) {
            DOM.emojiPickerModal.classList.remove(CLS.SHOW);
            if (!commit) return;
            // v3.2.0 — prefer custom-typed emoji over pendingEmoji if user pasted one
            const customVal = (DOM.customEmojiInput && DOM.customEmojiInput.value || '').trim();
            const emoji = customVal || State.pendingEmoji || CONFIG.DEFAULT_EMOJI;
            const name = (DOM.emojiPickerName.value || '').trim() || CONFIG.DEFAULT_REWARD_NAME;
            DOM.rewardPlaceholder.style.display = 'none';
            DOM.rewardImage.style.display = 'block';
            // Escape emoji for safe SVG embedding
            const safeEmoji = emoji.replace(/[<>&"']/g, ch => ({
                '<': '&lt;', '>': '&gt;', '&': '&amp;', '"': '&quot;', "'": '&apos;'
            }[ch]));
            DOM.rewardImage.src =
                `data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E` +
                `%3Ctext x='50' y='68' font-size='60' text-anchor='middle'%3E${safeEmoji}%3C/text%3E` +
                `%3C/svg%3E`;
            text(DOM.rewardText, name);
            DOM.rewardBox.classList.add(CLS.HAS_REWARD);
            // v3.2.0 — persist reward emoji + add to recent history
            State.rewardEmoji = emoji;
            recordRecentEmoji(emoji);
        }

        // v3.2.0 — keep a rolling history of recently used emoji in localStorage
        function recordRecentEmoji(emoji) {
            if (!emoji) return;
            const recent = Settings.get('recentEmojis') || [];
            const filtered = recent.filter(e => e !== emoji);
            filtered.unshift(emoji);
            const trimmed = filtered.slice(0, CONFIG.EMOJI_RECENT_MAX);
            Settings.set('recentEmojis', trimmed);
        }

        function updateRewardSize(size) {
            const px = `${size}px`;
            if (DOM.rewardImage) {
                DOM.rewardImage.style.width = px;
                DOM.rewardImage.style.height = px;
            }
            text(DOM.sizeValue, px);
            if (!State.muted) SFX.sliderTick();
        }

        // ===== Reset (one place, was 3) =====
        function resetTransientUI() {
            stopFireworks();
            DOM.celebrationMsg.classList.remove(CLS.SHOW);
        }

        function resetBoard() {
            document.querySelectorAll(`.${CLS.STAR_SLOT}`).forEach(s =>
                s.classList.remove(CLS.FILLED)
            );
            State.filledTokens = 0;
            updateProgress();
            resetTransientUI();
            const badge = document.getElementById(CLS.COMPLETE_BADGE);
            if (badge) badge.remove();
        }

        // ===== Print: iframe + srcdoc + toast fallback chain =====
        // (Restored from v2.0.1; was lost in v3.0.0 cleanup refactor)

        function showPrintToast(msg, opts = {}) {
            text(DOM.printToastMsg, msg);
            DOM.printToast.classList.toggle(CLS.ERROR, !!opts.error);
            DOM.printToastRetry.style.display = opts.retry ? 'inline-block' : 'none';
            DOM.printToastDismiss.style.display = opts.dismiss ? 'inline-block' : 'none';
            DOM.printToast.classList.add(CLS.SHOW);

            if (opts.autoHideMs) {
                clearTimeout(DOM.printToast._hideTimer);
                DOM.printToast._hideTimer = setTimeout(
                    () => DOM.printToast.classList.remove(CLS.SHOW),
                    opts.autoHideMs
                );
            }
        }

        function hidePrintToast() {
            DOM.printToast.classList.remove(CLS.SHOW, CLS.ERROR);
            clearTimeout(DOM.printToast._hideTimer);
        }

        function buildPrintDocument() {
            const board = DOM.board.cloneNode(true);
            // Strip interactive controls
            board.querySelectorAll('.actions, .star-control button').forEach(n => n.remove());
            // Make .star-control print without grey background
            const sc = board.querySelector('.star-control');
            if (sc) sc.style.background = 'transparent';
            // Inline a stripped stylesheet for portability
            const inlineCss = `
                body { font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif; background:white; padding:20px; }
                .token-board { background:white; border:3px solid #333; border-radius:12px; padding:25px; max-width:100%; box-shadow:none; }
                .board-header { display:flex; align-items:center; margin-bottom:15px; }
                .board-title { font-size:26px; font-weight:bold; color:#333; }
                .board-subtitle { font-size:26px; color:#666; margin-right:10px; border-bottom:1px dashed #999; padding:0 6px; }
                .star-control { text-align:center; margin:12px 0; padding:8px; }
                .main-content { display:flex; justify-content:space-between; align-items:flex-start; margin:20px 0; }
                .goal-text { font-size:22px; font-weight:bold; color:#333; }
                .reward-box { width:130px; height:130px; border:3px dashed #4a90e2; border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f8f9fa; }
                .reward-box.has-reward { border-style:solid; border-color:#4caf50; }
                .reward-image { max-width:140px; max-height:140px; object-fit:contain; }
                .reward-text { font-size:13px; color:#555; margin-top:4px; text-align:center; }
                .tokens-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(52px, 1fr)); gap:10px; margin:25px 0; }
                .token-slot { width:52px; height:52px; border:2px solid #ddd; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:26px; }
                .token-slot.filled { background:#fff9c4; border-color:#ffc107; }
                .progress { text-align:center; font-size:16px; color:#555; margin:10px 0; }
            `;
            return `<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><title>SEN 獎勵表</title><style>${inlineCss}</style></head><body>${board.outerHTML}</body></html>`;
        }

        function doIframePrint() {
            return new Promise((resolve, reject) => {
                try {
                    const frame = DOM.printFrame;
                    const doc = buildPrintDocument();
                    frame.onload = () => {
                        try {
                            frame.contentWindow.focus();
                            frame.contentWindow.print();
                            resolve();
                        } catch (e) {
                            reject(e);
                        }
                    };
                    frame.srcdoc = doc;
                } catch (e) {
                    reject(e);
                }
            });
        }

        function doWindowPrint() {
            window.print();
        }

        async function preparePrint() {
            resetTransientUI();
            if (!State.muted) SFX.whoosh();
            showPrintToast('準備打印中…', { autoHideMs: CONFIG.PRINT_PREPARE_MS });

            // Strategy 1: iframe-based print (more reliable in kiosk / restricted Chrome)
            try {
                await doIframePrint();
                showPrintToast('已叫出打印對話框 — 請揀「另存為 PDF」或印表機', {
                    retry: true,
                    autoHideMs: CONFIG.PRINT_RETRY_HOLD_MS,
                });
                return;
            } catch (_) { /* fall through */ }

            // Strategy 2: window.print() fallback
            try {
                doWindowPrint();
                showPrintToast('已叫出打印對話框 — 請揀「另存為 PDF」或印表機', {
                    retry: true,
                    autoHideMs: CONFIG.PRINT_RETRY_HOLD_MS,
                });
            } catch (_) {
                // Strategy 3: error toast with manual-instruction dismiss
                showPrintToast('瀏覽器封鎖咗打印功能，請用鍵盤快捷鍵 Cmd/Ctrl+P 強制打印', {
                    error: true,
                    dismiss: true,
                });
            }
        }

        // Clear toast when print dialog closes
        window.addEventListener('afterprint', hidePrintToast);

        // ===== Init =====
        function init() {
            text(DOM.starCountDisplay, State.totalTokens);
            rebuildTokens();
            updateProgress();

            // v3.1.0 — respect OS-level reduced-motion preference
            const rmQuery = window.matchMedia(CONFIG.REDUCED_MOTION_QUERIES[0]);
            State.reducedMotion = rmQuery.matches;
            const onRmChange = (e) => { State.reducedMotion = e.matches; };
            if (rmQuery.addEventListener) {
                rmQuery.addEventListener('change', onRmChange);
            } else if (rmQuery.addListener) {
                // Safari < 14 fallback
                rmQuery.addListener(onRmChange);
            }

            // Event delegation for [data-action] elements
            DOM.body.addEventListener('click', (ev) => {
                const t = ev.target.closest('[data-action]');
                if (!t) return;
                switch (t.dataset.action) {
                    case 'inc-stars':       return changeStarCount(1);
                    case 'dec-stars':       return changeStarCount(-1);
                    case 'open-reward':     return openRewardModal();
                    case 'print':           return preparePrint();
                    case 'emoji-cancel':    return closeRewardModal(false);
                    case 'emoji-ok':        return closeRewardModal(true);
                    case 'toggle-settings': return toggleSettingsPanel();
                }
            });

            // v3.1.0 — keyboard activation for token slots (a11y)
            DOM.tokensGrid.addEventListener('keydown', (ev) => {
                const slot = ev.target.closest(`.${CLS.STAR_SLOT}`);
                if (!slot) return;
                if (ev.key === 'Enter' || ev.key === ' ') {
                    ev.preventDefault();
                    toggleToken(slot);
                }
            });

            DOM.body.addEventListener('input', (ev) => {
                const t = ev.target.closest('[data-action="resize-reward"]');
                if (t) updateRewardSize(t.value);
            });

            // v3.1.0 — Esc closes emoji picker; Enter on name input confirms
            DOM.emojiPickerModal.addEventListener('keydown', (ev) => {
                if (ev.key === 'Escape') {
                    ev.preventDefault();
                    closeRewardModal(false);
                } else if (ev.key === 'Enter' && ev.target === DOM.emojiPickerName) {
                    ev.preventDefault();
                    closeRewardModal(true);
                }
            });

            // v3.1.0 — click backdrop closes picker (cancel)
            DOM.emojiPickerModal.addEventListener('click', (ev) => {
                if (ev.target === DOM.emojiPickerModal) closeRewardModal(false);
            });

            DOM.printToastRetry.addEventListener('click', preparePrint);
            DOM.printToastDismiss.addEventListener('click', hidePrintToast);

            // v3.2.0 — settings select handlers (persist on change)
            DOM.settingVfx.addEventListener('change', (ev) => {
                State.vfxMode = ev.target.value;
                Settings.set('vfxMode', State.vfxMode);
            });
            DOM.settingMute.addEventListener('change', (ev) => {
                State.muted = ev.target.value === 'true';
                Settings.set('muted', State.muted);
                if (!State.muted) SFX.resume();  // unlock audio on first unmute
            });
            // v3.2.1 — pop sound preset change: persist + immediate preview
            if (DOM.settingPop) {
                DOM.settingPop.addEventListener('change', (ev) => {
                    State.popSound = ev.target.value;
                    Settings.set('popSound', State.popSound);
                    // Preview so user can hear before closing panel
                    if (!State.muted) SFX.tickOff();
                });
            }
            // v3.2.1 — tap sound preset change: persist + immediate preview
            if (DOM.settingTap) {
                DOM.settingTap.addEventListener('change', (ev) => {
                    State.tapSound = ev.target.value;
                    Settings.set('tapSound', State.tapSound);
                    if (!State.muted) SFX.tickOn();
                });
            }

            // v3.2.0 — Esc closes settings panel (when emoji picker is closed)
            DOM.body.addEventListener('keydown', (ev) => {
                if (ev.key === 'Escape' &&
                    !DOM.settingsPanel.hasAttribute('hidden') &&
                    !DOM.emojiPickerModal.classList.contains(CLS.SHOW)) {
                    toggleSettingsPanel();
                }
            });

            // v3.2.0 — click outside settings panel closes it
            document.addEventListener('click', (ev) => {
                if (DOM.settingsPanel.hasAttribute('hidden')) return;
                if (DOM.settingsPanel.contains(ev.target) || DOM.settingsGear.contains(ev.target)) return;
                toggleSettingsPanel();
            });

            // v3.2.0 — custom emoji input: clear pendingEmoji's .selected highlight
            // when user types; live preview is the input itself
            DOM.customEmojiInput.addEventListener('input', () => {
                DOM.emojiGrid.querySelectorAll('button').forEach(b => b.classList.remove(CLS.SELECTED));
            });

            // Throttled resize
            let resizePending = false;
            window.addEventListener('resize', () => {
                if (resizePending) return;
                resizePending = true;
                requestAnimationFrame(() => {
                    DOM.canvas.width = window.innerWidth;
                    DOM.canvas.height = window.innerHeight;
                    resizePending = false;
                });
            });
            DOM.canvas.width = window.innerWidth;
            DOM.canvas.height = window.innerHeight;
        }

        init();
    })();
    </script>
</body>
